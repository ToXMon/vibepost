version: "2.0"

services:
  vibepost:
    image: wijnaldum/vibepost-webapp:0.3.2
    expose:
      - port: 3000
        as: 80
        to:
          - global: true
    env:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SECRET=replace-with-strong-secret
      - NEXT_PUBLIC_SITE_URL=https://your-live-url.akash
      - PINATA_JWT=
      - RESEND_API_KEY=
      - STRIPE_SECRET_KEY=
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=
      - STRIPE_WEBHOOK_SECRET=

profiles:
  compute:
    vibepost:
      resources:
        cpu:
          units: 1
        memory:
          size: 1Gi
        storage:
          size: 5Gi
  placement:
    dcloud:
      pricing:
        vibepost:
          denom: uakt
          amount: 10000

deployment:
  vibepost:
    dcloud:
      profile: vibepost
      count: 1
